<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TerryEdu 手機門禁</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #121212; color: white; }
        .nfc-area { border: 2px dashed #444; padding: 50px; border-radius: 20px; margin: 20px; }
        .btn { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; }
    </style>
</head>
<body>
    <h1>手機行動門禁</h1>
    <div class="nfc-area" id="box">
        <p id="status">點擊按鈕後<br>將卡片貼在手機背面</p>
    </div>
    <button class="btn" onclick="readNFC()">開始感應</button>

    <script>
        async function readNFC() {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    document.getElementById('status').innerText = "掃描中...請靠近卡片";

                    ndef.onreading = event => {
                        const serialNumber = event.serialNumber;
                        // 這裡會讀到卡片的序號 (例如 04:12:34:56)
                        document.getElementById('status').innerHTML = 
                            `<span style="color:#00f260">驗證成功！</span><br>ID: ${serialNumber}`;
                        alert("歡迎登入管理系統！\nID: " + serialNumber);
                    };
                } catch (error) {
                    alert("錯誤: " + error);
                }
            } else {
                alert("此瀏覽器不支援 WebNFC (請使用 Android Chrome)");
            }
        }
    </script>
</body>
</html>
